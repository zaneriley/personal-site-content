name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  content-validation:
    name: Content validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content
        uses: actions/checkout@v6
        with:
          path: content
          fetch-depth: 0

      - name: Checkout portfolio app
        uses: actions/checkout@v6
        with:
          repository: zaneriley/personal-site
          path: app

      - name: Prove draft-safety guardrails
        working-directory: content
        run: ./run ci:draft-safety "$GITHUB_WORKSPACE/app"

      - name: Validate content for publishing
        id: content-verdict
        working-directory: content
        env:
          CONTENT_VALIDATE_DIFF_RANGE: ${{ github.event_name == 'pull_request' && format('origin/{0}...HEAD', github.base_ref) || format('{0}..{1}', github.event.before, github.sha) }}
        run: |
          set +e
          ./run ci:validate "$GITHUB_WORKSPACE/app"
          status=$?
          echo "$status" > .tmp/ci-artifacts/content-publication/exit-code.txt
          exit 0

      - name: Report content verdict
        if: always()
        working-directory: content
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          verdict="$(cat .tmp/ci-artifacts/content-publication/verdict.txt)"
          description="$(cat .tmp/ci-artifacts/content-publication/description.txt)"

          case "$verdict" in
            accepted | ignored)
              state="success"
              ;;
            rejected)
              state="failure"
              ;;
            *)
              state="error"
              ;;
          esac

          gh api "repos/${GITHUB_REPOSITORY}/statuses/${STATUS_SHA}" \
            -f "state=${state}" \
            -f "context=Content publication verdict" \
            -f "description=${description}" \
            -f "target_url=${STATUS_TARGET_URL}" >/dev/null

      - name: Enforce content validation result
        if: always()
        working-directory: content
        run: exit "$(cat .tmp/ci-artifacts/content-publication/exit-code.txt)"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: ./run ci:lint
