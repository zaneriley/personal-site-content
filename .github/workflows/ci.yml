name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  content-validation:
    name: Content validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content
        uses: actions/checkout@v6
        with:
          path: content

      - name: Checkout portfolio app
        uses: actions/checkout@v6
        with:
          repository: zaneriley/personal-site
          path: app

      - name: Validate content for publishing
        working-directory: content
        run: ./run ci:validate "$GITHUB_WORKSPACE/app"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck run
